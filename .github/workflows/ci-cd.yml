name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Setup Node.js
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  - name: Install Dependencies
    run: npm install

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Python Packages
    run: pip install pandas scholarly

  - name: Run Python Script
    run: python test_scholarly.py
```


