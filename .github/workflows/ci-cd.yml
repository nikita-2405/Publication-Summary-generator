name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Setup Node.js
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  - name: Install Backend Dependencies
    run: |
      npm install

  - name: Build Frontend
    run: |
      cd client
      npm install
      npm run build

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Python Dependencies
    run: |
      pip install pandas scholarly

  - name: Run Data Script (Test)
    run: |
      python test_script.py

  - name: Prisma Check
    run: |
      npx prisma generate

  - name: Build Success
    run: echo "Pipeline executed successfully!"
```
