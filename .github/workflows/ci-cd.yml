name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Python Packages
    run: pip install pandas scholarly openpyxl

  - name: Run Test Script
    run: python test_scholarly.py
```



